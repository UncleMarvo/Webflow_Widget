<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Origin Embed Test</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
    h1 { color: #333; }
    .test-block { background: #f5f5f5; border-radius: 8px; padding: 20px; margin: 20px 0; }
    .test-block h2 { margin-top: 0; }
    code { background: #e5e5e5; padding: 2px 6px; border-radius: 4px; }
    #log { font-family: monospace; white-space: pre-wrap; background: #1a1a2e; color: #0f0; padding: 16px; border-radius: 8px; max-height: 400px; overflow-y: auto; font-size: 13px; }
    img { max-width: 100%; border: 1px solid #ccc; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Phasemark - Cross-Origin Test Page</h1>
  <p>This page runs on port <strong>8888</strong> and tests the embed widget against the backend on port <strong>3001</strong>.</p>

  <div class="test-block">
    <h2>Test Content</h2>
    <p>This is sample content to test screenshot capture. Below is an image and styled content.</p>
    <div style="display: flex; gap: 20px; margin: 20px 0;">
      <div style="width: 200px; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px;"></div>
      <div style="width: 200px; height: 200px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px;"></div>
    </div>
  </div>

  <div class="test-block">
    <h2>Manual Test Buttons</h2>
    <button id="test-cors" style="padding:10px 20px; margin:5px; cursor:pointer;">Test CORS (POST /feedback)</button>
    <button id="test-screenshot" style="padding:10px 20px; margin:5px; cursor:pointer;">Test Screenshot Capture</button>
    <button id="test-offline" style="padding:10px 20px; margin:5px; cursor:pointer;">Test Offline Queue</button>
    <button id="test-sync" style="padding:10px 20px; margin:5px; cursor:pointer;">Sync Queued Feedback</button>
    <button id="clear-log" style="padding:10px 20px; margin:5px; cursor:pointer;">Clear Log</button>
  </div>

  <div id="log"></div>

  <!-- Load html2canvas from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    const API_URL = 'http://localhost:3001';
    const API_KEY = 'wf_896cca3334effc32a14f85231d0216eaa8cd7fe084e17c7e';
    const logEl = document.getElementById('log');

    function log(msg) {
      const ts = new Date().toISOString().split('T')[1].split('.')[0];
      logEl.textContent += `[${ts}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    // Test 1: CORS
    document.getElementById('test-cors').addEventListener('click', async () => {
      log('--- CORS TEST ---');
      log(`Origin: ${window.location.origin}`);
      log(`Target: ${API_URL}/feedback`);

      try {
        const start = performance.now();
        const res = await fetch(API_URL + '/feedback', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-API-Key': API_KEY,
          },
          body: JSON.stringify({
            url: window.location.href,
            pageTitle: document.title,
            x: 50,
            y: 50,
            annotation: 'CORS test feedback from port 8888',
            deviceType: 'desktop',
            viewportWidth: window.innerWidth,
            viewportHeight: window.innerHeight,
          }),
        });
        const elapsed = Math.round(performance.now() - start);
        const data = await res.json();
        log(`Status: ${res.status} (${elapsed}ms)`);
        log(`Response: ${JSON.stringify(data, null, 2)}`);

        if (res.ok) {
          log('CORS TEST: PASS');
        } else {
          log('CORS TEST: FAIL (server returned error, but CORS itself worked)');
        }
      } catch (err) {
        log(`CORS TEST: FAIL`);
        log(`Error: ${err.message}`);
        if (err.message.includes('Failed to fetch')) {
          log('This is likely a CORS block - check browser console for exact error');
        }
      }
    });

    // Test 2: Screenshot
    document.getElementById('test-screenshot').addEventListener('click', async () => {
      log('--- SCREENSHOT TEST ---');
      log(`Viewport: ${window.innerWidth}x${window.innerHeight}`);
      log(`Device pixel ratio: ${window.devicePixelRatio}`);

      if (typeof html2canvas === 'undefined') {
        log('SCREENSHOT TEST: FAIL - html2canvas not loaded');
        return;
      }

      try {
        const start = performance.now();
        const canvas = await html2canvas(document.body, {
          useCORS: true,
          logging: false,
          scale: 1,
          windowWidth: document.documentElement.scrollWidth,
          windowHeight: document.documentElement.scrollHeight,
        });
        const captureTime = Math.round(performance.now() - start);
        log(`Capture time: ${captureTime}ms`);
        log(`Canvas size: ${canvas.width}x${canvas.height}`);

        const dataUrl = canvas.toDataURL('image/png', 0.8);
        const sizeKb = Math.round(dataUrl.length * 0.75 / 1024);
        log(`Data URL size: ${sizeKb}KB`);

        if (sizeKb > 5000) {
          log('WARNING: Screenshot is very large (>5MB), will be slow to POST');
        }

        log(`SCREENSHOT TEST: PASS (${captureTime}ms, ${sizeKb}KB)`);

        // Show preview
        const img = document.createElement('img');
        img.src = dataUrl;
        img.style.maxWidth = '300px';
        img.style.display = 'block';
        img.style.marginTop = '10px';
        document.querySelector('.test-block:nth-child(2)').appendChild(img);
      } catch (err) {
        log(`SCREENSHOT TEST: FAIL`);
        log(`Error: ${err.message}`);
        log(`Stack: ${err.stack}`);
      }
    });

    // Test 3: Offline queue
    document.getElementById('test-offline').addEventListener('click', () => {
      log('--- OFFLINE QUEUE TEST ---');
      const payload = {
        url: window.location.href,
        pageTitle: 'Offline Test',
        x: 25,
        y: 75,
        annotation: 'Offline feedback test ' + Date.now(),
        deviceType: 'desktop',
        viewportWidth: window.innerWidth,
        viewportHeight: window.innerHeight,
      };

      try {
        const stored = JSON.parse(sessionStorage.getItem('wf_feedback_queue') || '[]');
        stored.push(payload);
        sessionStorage.setItem('wf_feedback_queue', JSON.stringify(stored));
        log(`Stored in queue. Queue length: ${stored.length}`);
        log(`Queue contents: ${JSON.stringify(stored, null, 2)}`);
        log('OFFLINE QUEUE STORE: PASS');
      } catch (err) {
        log(`OFFLINE QUEUE STORE: FAIL - ${err.message}`);
      }
    });

    // Test 4: Sync queued
    document.getElementById('test-sync').addEventListener('click', async () => {
      log('--- SYNC QUEUE TEST ---');
      const stored = JSON.parse(sessionStorage.getItem('wf_feedback_queue') || '[]');
      log(`Items in queue: ${stored.length}`);

      if (stored.length === 0) {
        log('Nothing to sync');
        return;
      }

      let synced = 0;
      let failed = 0;
      const remaining = [];

      for (const payload of stored) {
        try {
          const res = await fetch(API_URL + '/feedback', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-API-Key': API_KEY,
            },
            body: JSON.stringify(payload),
          });
          if (res.ok) {
            synced++;
            log(`Synced: ${payload.annotation}`);
          } else {
            failed++;
            remaining.push(payload);
            log(`Failed (${res.status}): ${payload.annotation}`);
          }
        } catch (err) {
          failed++;
          remaining.push(payload);
          log(`Network error: ${err.message}`);
        }
      }

      sessionStorage.setItem('wf_feedback_queue', JSON.stringify(remaining));
      log(`Sync complete: ${synced} synced, ${failed} failed, ${remaining.length} remaining`);
      log(remaining.length === 0 ? 'SYNC TEST: PASS' : 'SYNC TEST: PARTIAL');
    });

    document.getElementById('clear-log').addEventListener('click', () => {
      logEl.textContent = '';
    });

    log('Test page loaded. Origin: ' + window.location.origin);
    log('Backend target: ' + API_URL);
  </script>

  <!-- The embed widget - loaded AFTER test infrastructure -->
  <script src="../embed/embed.js" data-api-key="wf_896cca3334effc32a14f85231d0216eaa8cd7fe084e17c7e" data-api-url="http://localhost:3001"></script>
</body>
</html>
